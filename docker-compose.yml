services:
  backend:
    build:
      context: ./backend
    ports:
      - "5050:5000"
    environment:
      FLASK_ENV: development

  frontend:
    build:
      context: ./frontend
    ports:
      - "5174:5174"
    environment:
      VITE_API_BASE: http://127.0.0.1:5050/api
    depends_on:
      - backend
